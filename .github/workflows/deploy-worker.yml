name: Deploy Download Worker

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional release tag for this repository, for example v1.2.3
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commit: ${{ steps.resolve.outputs.target_commit }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
      version_source: ${{ steps.resolve.outputs.version_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and target commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: python3 scripts/resolve_release.py

  deploy:
    runs-on: ubuntu-latest
    needs: prepare
    strategy:
      matrix:
        include:
          - worker_name: ${{ vars.CF_WORKER_NAME }}
            version_key: download-version
          - worker_name: ${{ vars.CF_WORKER_TEST_NAME }}
            version_key: download-test-version
    steps:
      - name: Checkout repository at target commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.target_commit }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: worker/package.json

      - name: Install worker dependencies
        run: npm install
        working-directory: worker

      - name: Validate worker source
        run: npm run check
        working-directory: worker

      - name: Validate Bitwarden wiring
        env:
          BW_SM_ACCESS_TOKEN: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          BW_SECRET_ID_CF_API_TOKEN: ${{ vars.BW_SECRET_ID_CF_API_TOKEN }}
        run: |
          set -euo pipefail
          required_vars=(
            BW_SM_ACCESS_TOKEN
            BW_SECRET_ID_CF_API_TOKEN
          )

          for required_var in "${required_vars[@]}"; do
            if [[ -z "${!required_var:-}" ]]; then
              echo "Missing required GitHub secret/variable: ${required_var}" >&2
              exit 1
            fi
          done

      - name: Load Cloudflare API token from Bitwarden
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          cloud_region: ${{ vars.BW_CLOUD_REGION || 'us' }}
          secrets: |
            ${{ vars.BW_SECRET_ID_CF_API_TOKEN }} > CF_API_TOKEN

      - name: Render Wrangler config
        env:
          CF_WORKER_NAME: ${{ matrix.worker_name }}
          CF_WORKER_KV_NAMESPACE_ID: ${{ vars.CF_WORKER_KV_NAMESPACE_ID }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          VERSION_KEY: ${{ matrix.version_key }}
        run: npm run render-config
        working-directory: worker

      - name: Deploy worker
        env:
          CF_API_TOKEN: ${{ env.CF_API_TOKEN }}
        run: CLOUDFLARE_API_TOKEN="$CF_API_TOKEN" npx wrangler deploy --config wrangler.toml
        working-directory: worker

  publish:
    runs-on: ubuntu-latest
    needs:
      - prepare
      - deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET_COMMIT: ${{ needs.prepare.outputs.target_commit }}
          TAG_EXISTS: ${{ needs.prepare.outputs.tag_exists }}
          PROD_WORKER_NAME: ${{ vars.CF_WORKER_NAME }}
          TEST_WORKER_NAME: ${{ vars.CF_WORKER_TEST_NAME }}
        run: |
          set -euo pipefail

          tag_created=0
          cleanup() {
            if [[ "$tag_created" == "1" ]]; then
              git push origin ":refs/tags/${RELEASE_TAG}"
            fi
          }
          trap cleanup ERR

          cat > release-notes.md <<EOF
          # ${RELEASE_TAG}

          Cloudflare Worker deployment built from commit ${TARGET_COMMIT}.

          - ${PROD_WORKER_NAME}: VERSION_KEY=download-version
          - ${TEST_WORKER_NAME}: VERSION_KEY=download-test-version
          EOF

          if [[ "$TAG_EXISTS" != "true" ]]; then
            git push origin "${TARGET_COMMIT}:refs/tags/${RELEASE_TAG}"
            tag_created=1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          else
            gh release create "$RELEASE_TAG" \
              --target "$TARGET_COMMIT" \
              --title "$RELEASE_TAG" \
              --notes-file release-notes.md
          fi

          trap - ERR