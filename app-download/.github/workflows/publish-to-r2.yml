name: Publish Apps To R2

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Optional tag for this repository release and the top-level R2 directory, for example v1.2.3
        required: false
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      target_commit: ${{ steps.resolve.outputs.target_commit }}
      tag_exists: ${{ steps.resolve.outputs.tag_exists }}
      version_source: ${{ steps.resolve.outputs.version_source }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag and target commit
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: python3 scripts/resolve_release.py

      - name: Validate optional Bitwarden source token wiring
        if: ${{ vars.BW_SECRET_ID_SOURCE_GH_TOKEN != '' }}
        env:
          BW_SM_ACCESS_TOKEN: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          BW_SECRET_ID_SOURCE_GH_TOKEN: ${{ vars.BW_SECRET_ID_SOURCE_GH_TOKEN }}
        run: |
          set -euo pipefail
          required_vars=(
            BW_SM_ACCESS_TOKEN
            BW_SECRET_ID_SOURCE_GH_TOKEN
          )

          for required_var in "${required_vars[@]}"; do
            if [[ -z "${!required_var:-}" ]]; then
              echo "Missing required GitHub secret/variable: ${required_var}" >&2
              exit 1
            fi
          done

      - name: Load source GitHub token from Bitwarden
        if: ${{ vars.BW_SECRET_ID_SOURCE_GH_TOKEN != '' }}
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          cloud_region: ${{ vars.BW_CLOUD_REGION || 'us' }}
          secrets: |
            ${{ vars.BW_SECRET_ID_SOURCE_GH_TOKEN }} > SOURCE_GH_TOKEN

      - name: Download source release assets
        env:
          SOURCE_GH_TOKEN: ${{ env.SOURCE_GH_TOKEN }}
        run: |
          python3 scripts/download_release_assets.py \
            --config config/apps.json \
            --release-tag "${{ steps.resolve.outputs.release_tag }}" \
            --output-dir bundle

      - name: Upload prepared bundle
        uses: actions/upload-artifact@v4
        with:
          name: prepared-release-bundle
          path: bundle
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prepared bundle
        uses: actions/download-artifact@v4
        with:
          name: prepared-release-bundle
          path: bundle

      - name: Validate Bitwarden wiring
        env:
          BW_SM_ACCESS_TOKEN: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          BW_SECRET_ID_R2_ACCESS_KEY_ID: ${{ vars.BW_SECRET_ID_R2_ACCESS_KEY_ID }}
          BW_SECRET_ID_R2_SECRET_ACCESS_KEY: ${{ vars.BW_SECRET_ID_R2_SECRET_ACCESS_KEY }}
        run: |
          set -euo pipefail
          required_vars=(
            BW_SM_ACCESS_TOKEN
            BW_SECRET_ID_R2_ACCESS_KEY_ID
            BW_SECRET_ID_R2_SECRET_ACCESS_KEY
          )

          for required_var in "${required_vars[@]}"; do
            if [[ -z "${!required_var:-}" ]]; then
              echo "Missing required GitHub secret/variable: ${required_var}" >&2
              exit 1
            fi
          done

      - name: Load R2 secrets from Bitwarden
        uses: bitwarden/sm-action@v3.0.0
        with:
          access_token: ${{ secrets.BW_SM_ACCESS_TOKEN }}
          cloud_region: ${{ vars.BW_CLOUD_REGION || 'us' }}
          secrets: |
            ${{ vars.BW_SECRET_ID_R2_ACCESS_KEY_ID }} > R2_ACCESS_KEY_ID
            ${{ vars.BW_SECRET_ID_R2_SECRET_ACCESS_KEY }} > R2_SECRET_ACCESS_KEY

      - name: Sync files to Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ env.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ env.R2_SECRET_ACCESS_KEY }}
          AWS_EC2_METADATA_DISABLED: true
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_ENDPOINT: https://${{ vars.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          aws s3 sync \
            "bundle/${RELEASE_TAG}/" \
            "s3://${R2_BUCKET}/${RELEASE_TAG}/" \
            --endpoint-url "${R2_ENDPOINT}" \
            --delete \
            --no-progress

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
          TARGET_COMMIT: ${{ needs.prepare.outputs.target_commit }}
          TAG_EXISTS: ${{ needs.prepare.outputs.tag_exists }}
        run: |
          set -euo pipefail

          tag_created=0
          cleanup() {
            if [[ "$tag_created" == "1" ]]; then
              git push origin ":refs/tags/${RELEASE_TAG}"
            fi
          }
          trap cleanup ERR

          if [[ "$TAG_EXISTS" != "true" ]]; then
            git push origin "${TARGET_COMMIT}:refs/tags/${RELEASE_TAG}"
            tag_created=1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file bundle/release-notes.md
            gh release upload "$RELEASE_TAG" bundle/manifest.json --clobber
          else
            gh release create "$RELEASE_TAG" bundle/manifest.json \
              --target "$TARGET_COMMIT" \
              --title "$RELEASE_TAG" \
              --notes-file bundle/release-notes.md
          fi

          trap - ERR